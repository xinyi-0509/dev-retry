<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LibHGP 几何算法可视化</title>
  <style>
    body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
    #sidebar {
      width: 280px; padding: 16px; background: #1a1a2e;
      color: #eee; overflow-y: auto; z-index: 10;
    }
    #canvas-container { flex: 1; position: relative; }
    canvas { display: block; }
    .section { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 14px; }
    h3 { color: #a78bfa; margin: 0 0 10px; font-size: 14px; }
    button {
      width: 100%; padding: 8px; margin-top: 6px;
      background: #7c3aed; color: white; border: none;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #4b5563; cursor: not-allowed; }
    input[type=range] { width: 100%; margin-top: 4px; }
    label { font-size: 12px; color: #aaa; }
    #status {
      position: absolute; bottom: 10px; left: 10px;
      color: white; background: rgba(0,0,0,0.5);
      padding: 6px 12px; border-radius: 4px; font-size: 12px;
    }
  </style>
</head>
<body>

<!-- 侧边栏：算法控制面板 -->
<div id="sidebar">
  <h2 style="color:#a78bfa; margin-top:0">LibHGP 算法库</h2>

  <!-- 算法 1：3D 凸包 -->
  <div class="section">
    <h3>🔷 3D 凸包</h3>
    <label>随机点数量：<span id="pt-count-label">30</span></label>
    <input type="range" id="pt-count" min="10" max="200" value="30"
      oninput="document.getElementById('pt-count-label').textContent=this.value">
    <button onclick="runConvexHull3D()">计算并渲染凸包</button>
  </div>

  <!-- 算法 2：拉普拉斯平滑 -->
  <div class="section">
    <h3>🌊 拉普拉斯平滑</h3>
    <label>迭代次数：<span id="smooth-iter-label">5</span></label>
    <input type="range" id="smooth-iter" min="1" max="50" value="5"
      oninput="document.getElementById('smooth-iter-label').textContent=this.value">
    <button onclick="runSmooth()">平滑当前网格</button>
  </div>

  <!-- 算法 3：网格曲率（热力图） -->
  <div class="section">
    <h3>🌡️ 曲率热力图</h3>
    <button onclick="runCurvature()">计算曲率着色</button>
  </div>

  <!-- 算法 4：最短测地路径 + 距离 -->
  <div class="section">
    <h3>📏 最短测地路径 & 距离</h3>
    <label>点击网格选择起点/终点</label>
    <button onclick="startGeodesicPick()">选择起/终点</button>
    <button onclick="runGeodesic()">计算路径 & 距离</button>
    <div id="geodesic-result"
         style="margin-top:8px; font-size:12px; color:#6ee7b7; min-height:16px;"></div>
  </div>

  <!-- 算法 5：网格切片 -->
  <div class="section">
    <h3>✂️ 网格切片</h3>
    <label>切片数量：<span id="slice-count-label">5</span></label>
    <input type="range" id="slice-count" min="1" max="20" value="5"
      oninput="document.getElementById('slice-count-label').textContent=this.value">
    <button onclick="runSlicer()">沿Y轴切片</button>
  </div>

  <!-- 算法 6：2D 凸包 -->
  <div class="section">
    <h3>⬟ 2D 凸包</h3>
    <label>在下方 XY 平面点击添加点</label>
    <button onclick="enable2DMode()">进入 2D 模式</button>
    <button onclick="run2DConvexHull()">计算 2D 凸包</button>
    <button onclick="clear2D()">清空</button>
  </div>

    <!-- 算法 7：网格边界提取 -->
  <div class="section">
    <h3>🔲 网格边界</h3>
    <button onclick="runMeshBoundary()">提取并渲染边界</button>
  </div>

  <!-- 算法 8：顶点法向量 -->
  <div class="section">
    <h3>➡️ 顶点法向量</h3>
    <label>箭头长度：<span id="normal-len-label">0.1</span></label>
    <input type="range" id="normal-len" min="0.02" max="0.5"
           step="0.01" value="0.1"
      oninput="document.getElementById('normal-len-label').textContent=
               parseFloat(this.value).toFixed(2)">
    <button onclick="runMeshNormals()">渲染法向量箭头</button>
  </div>

  <!-- 算法 9：包围盒 -->
  <div class="section">
    <h3>📦 包围盒</h3>
    <button onclick="runMeshBBox()">显示包围盒</button>
  </div>

  <!-- 算法 10：表面采样 -->
  <div class="section">
    <h3>🔵 表面采样</h3>
    <label>采样密度：<span id="sample-density-label">0.05</span></label>
    <input type="range" id="sample-density" min="0.01" max="0.2"
           step="0.01" value="0.05"
      oninput="document.getElementById('sample-density-label').textContent=
               parseFloat(this.value).toFixed(2)">
    <button onclick="runMeshSampling()">采样并渲染点云</button>
  </div>

  <!-- 算法 11：Loop 细分 -->
  <div class="section">
    <h3>🔺 Loop 细分</h3>
    <label>每次点击细分一步（面片数 ×4）</label>
    <button onclick="runSubdivide()">细分一步</button>
  </div>

  <!-- 算法 12：2D 布尔并集 -->
  <div class="section">
    <h3>⊕ 2D 多边形并集</h3>
    <label>先用 2D 模式各画一个多边形</label>
    <button onclick="startUnionPoly0()">画多边形 A</button>
    <button onclick="startUnionPoly1()">画多边形 B</button>
    <button onclick="runPolygonUnion()">计算布尔并集</button>
    <button onclick="clearUnion()">清空</button>
  </div>
</div>


<!-- Three.js 画布 -->
<div id="canvas-container">
  <div id="status">就绪</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── 全局 API 地址 ──────────────────────────────
const API = 'http://localhost:8000/api';

// ════════════════════════════════════════════════
// Three.js 场景初始化
// ════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const camera = new THREE.PerspectiveCamera(
  45, container.clientWidth / container.clientHeight, 0.01, 1000
);
camera.position.set(0, 0, 5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AxesHelper(2));

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ════════════════════════════════════════════════
// 工具函数
// ════════════════════════════════════════════════

const status = (msg) =>
  document.getElementById('status').textContent = msg;

// 清除场景中的几何对象（保留灯光/坐标轴）
function clearScene() {
  scene.children
    .filter(o => o.isMesh || o.isLine || o.isPoints || o.isLineSegments)
    .forEach(o => { scene.remove(o); o.geometry.dispose(); });
}

// 从 API 返回的 {vertices:[...], faces:[...]} 构建 BufferGeometry
function buildGeometry(data) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',
    new THREE.Float32BufferAttribute(data.vertices, 3));
  if (data.faces && data.faces.length > 0)
    geo.setIndex(data.faces);
  geo.computeVertexNormals();
  return geo;
}

// 热力图着色（蓝→绿→红）
function applyHeatmapColors(geo, values) {
  const min = Math.min(...values), max = Math.max(...values);
  const colors = [];
  for (const v of values) {
    const t = (v - min) / (max - min + 1e-9);
    const r = Math.min(1, t * 2);
    const g = t < 0.5 ? t * 2 : (1 - t) * 2;
    const b = Math.max(0, 1 - t * 2);
    colors.push(r, g, b);
  }
  geo.setAttribute('color',
    new THREE.Float32BufferAttribute(colors, 3));
}

// ════════════════════════════════════════════════
// 全局状态
// ════════════════════════════════════════════════
let currentMesh     = null;   // 当前 Three.js Mesh 对象
let currentMeshData = null;   // 当前网格原始数据
let currentMeshId   = null;   // 服务端 mesh_id（替代硬编码路径）
let geodesicSource  = null;
let geodesicTarget  = null;
let points2D        = [];
let mode2D          = false;

// ════════════════════════════════════════════════
// 算法 1：3D 凸包
// ════════════════════════════════════════════════
window.runConvexHull3D = async () => {
  const n = parseInt(document.getElementById('pt-count').value);
  const points = Array.from({ length: n }, () => [
    (Math.random() - 0.5) * 4,
    (Math.random() - 0.5) * 4,
    (Math.random() - 0.5) * 4,
  ]);

  status('计算凸包中...');
  try {
    const res  = await fetch(`${API}/convex_hull_3d`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ points }),
    });
    const data = await res.json();
    clearScene();

    const geo = buildGeometry(data);
    const mat = new THREE.MeshPhongMaterial({
      color: 0x7c3aed, transparent: true, opacity: 0.6,
      side: THREE.DoubleSide,
    });
    currentMesh = new THREE.Mesh(geo, mat);
    scene.add(currentMesh);
    scene.add(new THREE.LineSegments(
      new THREE.WireframeGeometry(geo),
      new THREE.LineBasicMaterial({
        color: 0xa78bfa, opacity: 0.4, transparent: true
      })
    ));

    // ── 保存 mesh_id 和网格数据 ──────────────────
    currentMeshId = data.mesh_id;
    currentMeshData = {
      vertices:  data.vertices,
      face_id_0: data.faces.filter((_, i) => i % 3 === 0),
      face_id_1: data.faces.filter((_, i) => i % 3 === 1),
      face_id_2: data.faces.filter((_, i) => i % 3 === 2),
      vertices_nested: [],
    };
    for (let i = 0; i < data.vertices.length; i += 3)
      currentMeshData.vertices_nested.push([
        data.vertices[i], data.vertices[i+1], data.vertices[i+2]
      ]);

    status(`凸包：${data.vertices.length/3} 顶点，` +
           `${data.faces.length/3} 面片`);
  } catch(e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 2：拉普拉斯平滑
// ════════════════════════════════════════════════
window.runSmooth = async () => {
  if (!currentMeshData) { status('请先加载一个网格'); return; }
  const iter = parseInt(document.getElementById('smooth-iter').value);
  status(`平滑中（${iter} 次迭代）...`);
  try {
    const res  = await fetch(`${API}/smooth`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        vertices:   currentMeshData.vertices_nested,
        face_id_0:  currentMeshData.face_id_0,
        face_id_1:  currentMeshData.face_id_1,
        face_id_2:  currentMeshData.face_id_2,
        iterations: iter,
      }),
    });
    const data = await res.json();
    clearScene();

    const geo = buildGeometry(data);
    currentMesh = new THREE.Mesh(geo,
      new THREE.MeshPhongMaterial({
        color: 0x10b981, side: THREE.DoubleSide
      })
    );
    scene.add(currentMesh);
    scene.add(new THREE.LineSegments(
      new THREE.WireframeGeometry(geo),
      new THREE.LineBasicMaterial({
        color: 0x6ee7b7, transparent: true, opacity: 0.3
      })
    ));

    // ── 更新 mesh_id 和顶点数据 ──────────────────
    currentMeshId = data.mesh_id;
    currentMeshData.vertices = data.vertices;
    currentMeshData.vertices_nested = [];
    for (let i = 0; i < data.vertices.length; i += 3)
      currentMeshData.vertices_nested.push([
        data.vertices[i], data.vertices[i+1], data.vertices[i+2]
      ]);

    status(`平滑完成：${iter} 次迭代`);
  } catch(e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 3：曲率热力图
// ════════════════════════════════════════════════
window.runCurvature = async () => {
  if (!currentMeshId) { status('请先加载一个网格'); return; }
  status('计算曲率中...');
  try {
    const res  = await fetch(`${API}/curvature`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mesh_id:      currentMeshId,
        input_points: currentMeshData.vertices_nested,
      }),
    });
    const data = await res.json();

    if (currentMesh) {
      applyHeatmapColors(currentMesh.geometry, data.max_curvatures);
      currentMesh.material = new THREE.MeshPhongMaterial({
        vertexColors: true, side: THREE.DoubleSide
      });
    }
    status('曲率热力图渲染完成');
  } catch(e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 4：测地线路径（射线拾取起/终点）
// ════════════════════════════════════════════════
let pickStep = 0;   // 0=空闲, 1=选起点, 2=选终点

window.startGeodesicPick = () => {
  pickStep = 1;
  geodesicSource = null;
  geodesicTarget = null;
  status('请点击网格选择【起点】');
};

const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  if (pickStep === 0 || !currentMesh) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
  mouse.y = ((e.clientY - rect.top)  / rect.height) * -2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(currentMesh);
  if (!hits.length) return;

  const pt = hits[0].point;
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.05),
    new THREE.MeshBasicMaterial({
      color: pickStep === 1 ? 0x00ff00 : 0xff0000
    })
  );
  sphere.position.copy(pt);
  scene.add(sphere);

  if (pickStep === 1) {
    geodesicSource = [pt.x, pt.y, pt.z];
    pickStep = 2;
    status('请点击网格选择【终点】');
  } else {
    geodesicTarget = [pt.x, pt.y, pt.z];
    pickStep = 0;
    status('起/终点已选定，点击「计算测地路径」');
  }
});

window.runGeodesic = async () => {
  if (!geodesicSource || !geodesicTarget) {
    status('请先选择起/终点'); return;
  }
  if (!currentMeshId) { status('请先加载一个网格'); return; }
  status('计算��地路径中...');
  try {
    const res  = await fetch(`${API}/geodesic_path`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mesh_id: currentMeshId,
        source:  geodesicSource,
        target:  geodesicTarget,
      }),
    });
    const data = await res.json();

    // 渲染黄色测地路径折线
    const pts = data.path.map(p => new THREE.Vector3(p[0], p[1], p[2]));
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: 0xfbbf24 })
    ));

    // 在侧边栏面板内展示距离数值
    const distStr = data.distance !== undefined
      ? data.distance.toFixed(6)
      : '—';
    document.getElementById('geodesic-result').textContent =
      `📐 测地距离：${distStr}`;

    status(`测地路径：${pts.length} 个节点，距离 = ${distStr}`);
  } catch(e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 5：网格切片
// ════════════════════════════════════════════════
window.runSlicer = async () => {
  if (!currentMeshId) { status('请先加载一个网格'); return; }
  const n  = parseInt(document.getElementById('slice-count').value);

  // 根据当前顶点 Y 范围均匀切片
  const ys   = currentMeshData.vertices_nested.map(v => v[1]);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const ds   = Array.from({ length: n }, (_, i) =>
    -(yMin + (yMax - yMin) * (i + 1) / (n + 1))
  );

  status('切片中...');
  try {
    const res  = await fetch(`${API}/slicer`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mesh_id:      currentMeshId,
        plane_normal: [0, 1, 0],
        plane_ds:     ds,
      }),
    });
    const data = await res.json();

    const colors = [0xf87171,0xfbbf24,0x34d399,0x60a5fa,0xc084fc];
    data.slices.forEach((s, idx) => {
      const pts = s.contour.map(
        p => new THREE.Vector3(p[0], p[1], p[2])
      );
      if (!pts.length) return;
      pts.push(pts[0]);   // 闭合轮廓
      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({
          color: colors[idx % colors.length]
        })
      ));
    });
    status(`切片完成：${data.slices.length} 个截面`);
  } catch(e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 6：2D 凸包（XY 平面交互）
// ════════════════════════════════════════════════
window.enable2DMode = () => {
  mode2D = true;
  camera.position.set(0, 0, 8);
  camera.lookAt(0, 0, 0);
  status('2D 模式：在场景中点击添加点');
};

window.clear2D = () => {
  points2D = [];
  clearScene();
  // 清空时同步重置网格状态
  currentMesh     = null;
  currentMeshData = null;
  currentMeshId   = null;
  status('2D 点集已清空');
};

renderer.domElement.addEventListener('click', (e) => {
  if (!mode2D) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
  mouse.y = ((e.clientY - rect.top)  / rect.height) * -2 + 1;

  // 屏幕坐标反投影到 Z=0 平面
  const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5)
    .unproject(camera);
  const dir = vec.sub(camera.position).normalize();
  const t   = -camera.position.z / dir.z;
  const pos = camera.position.clone().add(dir.multiplyScalar(t));

  points2D.push([pos.x, pos.y]);

  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.05),
    new THREE.MeshBasicMaterial({ color: 0xfbbf24 })
  );
  dot.position.set(pos.x, pos.y, 0);
  scene.add(dot);
});

window.run2DConvexHull = async () => {
  if (points2D.length < 3) { status('至少需要 3 个点'); return; }
  try {
    const res  = await fetch(`${API}/convex_hull_2d`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ polygon: points2D }),
    });
    const data = await res.json();

    const hull = [...data.hull, data.hull[0]];   // 闭合
    const pts  = hull.map(p => new THREE.Vector3(p[0], p[1], 0));
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: 0xa78bfa })
    ));
    status(`2D 凸包：${data.hull.length} 个顶点`);
  } catch(e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 7-12：新增功能实现（边界/法向/包围盒/采样/细分/测地距离）
// ════════════════════════════════════════════════

window.runMeshBoundary = async () => {
  if (!currentMeshId) { status('请先加载一个网格'); return; }
  status('提取边界中...');
  try {
    const res  = await fetch(`${API}/mesh_boundary`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mesh_id: currentMeshId, input_points: [] }),
    });
    const data = await res.json();
    const colors = [0xf87171, 0xfbbf24, 0x34d399, 0x60a5fa];
    data.boundaries.forEach((loop, idx) => {
      const pts = loop.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      if (pts.length < 2) return;
      pts.push(pts[0]);
      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: colors[idx % colors.length] })
      ));
    });
    status(`边界：${data.boundaries.length} 条轮廓`);
  } catch(e) { status('错误：' + e.message); }
};

window.runMeshNormals = async () => {
  if (!currentMeshId) { status('请先加载一个网格'); return; }
  const arrowLen = parseFloat(document.getElementById('normal-len').value);
  status('计算法向量中...');
  try {
    const res  = await fetch(`${API}/mesh_normals`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mesh_id: currentMeshId, input_points: [] }),
    });
    const data = await res.json();
    const step = Math.max(1, Math.floor(data.vertices.length / 200));
    const positions = [], colorsArr = [];
    for (let i = 0; i < data.vertices.length; i += step) {
      const v = data.vertices[i], n = data.normals[i];
      positions.push(v[0], v[1], v[2],
        v[0]+n[0]*arrowLen, v[1]+n[1]*arrowLen, v[2]+n[2]*arrowLen);
      colorsArr.push(0, 1, 1, 1, 1, 1);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.Float32BufferAttribute(colorsArr, 3));
    scene.add(new THREE.LineSegments(geo,
      new THREE.LineBasicMaterial({ vertexColors: true })
    ));
    status(`法向量：${positions.length/6} 条箭头`);
  } catch(e) { status('错误：' + e.message); }
};

window.runMeshBBox = async () => {
  if (!currentMeshId) { status('请先加载一个网格'); return; }
  status('计算包围盒...');
  try {
    const res  = await fetch(`${API}/mesh_bbox`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mesh_id: currentMeshId, input_points: [] }),
    });
    const data = await res.json();
    const mn = data.min_corner, mx = data.max_corner;
    const box = new THREE.Box3(
      new THREE.Vector3(mn[0], mn[1], mn[2]),
      new THREE.Vector3(mx[0], mx[1], mx[2])
    );
    scene.add(new THREE.Box3Helper(box, 0xfbbf24));
    status(`包围盒：${(mx[0]-mn[0]).toFixed(3)} × ${(mx[1]-mn[1]).toFixed(3)} × ${(mx[2]-mn[2]).toFixed(3)}`);
  } catch(e) { status('错误：' + e.message); }
};

window.runMeshSampling = async () => {
  if (!currentMeshId) { status('请先加载一个网格'); return; }
  const density = parseFloat(document.getElementById('sample-density').value);
  status('表面采样中...');
  try {
    const res  = await fetch(`${API}/mesh_sampling`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mesh_id: currentMeshId, density }),
    });
    const data = await res.json();
    const flat = data.points.flatMap(p => [p[0], p[1], p[2]]);
    const geo  = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(flat, 3));
    scene.add(new THREE.Points(geo,
      new THREE.PointsMaterial({ color: 0x00ffff, size: 0.04 })
    ));
    status(`表面采样：${data.points.length} 个点`);
  } catch(e) { status('错误：' + e.message); }
};

window.runSubdivide = async () => {
  if (!currentMeshData) { status('请先加载一个网格'); return; }
  status('Loop 细分中...');
  try {
    const res  = await fetch(`${API}/subdivide`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        vertices:   currentMeshData.vertices_nested,
        face_id_0:  currentMeshData.face_id_0,
        face_id_1:  currentMeshData.face_id_1,
        face_id_2:  currentMeshData.face_id_2,
        iterations: 1,
      }),
    });
    const data = await res.json();
    clearScene();
    const geo = buildGeometry(data);
    currentMesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
      color: 0x818cf8, side: THREE.DoubleSide
    }));
    scene.add(currentMesh);
    scene.add(new THREE.LineSegments(
      new THREE.WireframeGeometry(geo),
      new THREE.LineBasicMaterial({ color: 0xc7d2fe, transparent: true, opacity: 0.2 })
    ));
    currentMeshId = data.mesh_id;
    currentMeshData.vertices  = data.vertices;
    currentMeshData.face_id_0 = data.faces.filter((_,i) => i%3===0);
    currentMeshData.face_id_1 = data.faces.filter((_,i) => i%3===1);
    currentMeshData.face_id_2 = data.faces.filter((_,i) => i%3===2);
    currentMeshData.vertices_nested = [];
    for (let i = 0; i < data.vertices.length; i += 3)
      currentMeshData.vertices_nested.push([
        data.vertices[i], data.vertices[i+1], data.vertices[i+2]
      ]);
    status(`Loop 细分完成：${data.faces.length/3} 面片`);
  } catch(e) { status('错误：' + e.message); }
};

window.runGeodesicDistance = async () => {
  if (!geodesicSource || !geodesicTarget) {
    status('请先通过「选择起/终点」选取两点'); return;
  }
  if (!currentMeshId) { status('请先加载一个网格'); return; }
  status('计算测地距离...');
  try {
    const res  = await fetch(`${API}/geodesic_distance`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mesh_id: currentMeshId, source: geodesicSource, target: geodesicTarget,
      }),
    });
    const data = await res.json();
    status(`测地线距离：${data.distance.toFixed(6)}`);
  } catch(e) { status('错误：' + e.message); }
};

// ════════════════════════════════════════════════
// 算法 13：2D 布尔并集
// unionMode: 0=关闭, 1=收集多边形A, 2=收集多边形B
// ════════════════════════════════════════════════
let unionMode  = 0;
let unionPoly0 = [];
let unionPoly1 = [];

// 覆盖 2D 凸包的第二个 click 监听器，同时处理 union 点收集
// 注意：直接在现有 if (!mode2D) return 前插入 union 逻辑
window.startUnionPoly0 = () => {
  unionPoly0 = [];
  unionMode  = 1;
  mode2D     = true;
  camera.position.set(0, 0, 8);
  camera.lookAt(0, 0, 0);
  status('2D 模式（多边形 A）：点击添加红色顶点，完成后点「画多边形 B」');
};

window.startUnionPoly1 = () => {
  unionPoly1 = [];
  unionMode  = 2;
  mode2D     = true;
  status('2D 模式（多边形 B）：点击添加蓝色顶点，完成后点「计算布尔并集」');
};

window.clearUnion = () => {
  unionPoly0 = []; unionPoly1 = [];
  unionMode  = 0;  mode2D = false;
  clearScene();
  status('并集数据已清空');
};

// 在现有 2D click 监听器之前注册 union 拦截
// （利用 unionMode 标志区分，不再注册新的监听器，通过给已有监听器打补丁实现）
// ── 重新注册一个补丁监听器，捕获 union 点 ────────
renderer.domElement.addEventListener('click', (e) => {
  // 只在 union 模式下生效
  if (unionMode === 0) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
  mouse.y = ((e.clientY - rect.top)  / rect.height) * -2 + 1;
  const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
  const dir = vec.sub(camera.position).normalize();
  const t   = -camera.position.z / dir.z;
  const pos = camera.position.clone().add(dir.multiplyScalar(t));

  const color = unionMode === 1 ? 0xf87171 : 0x60a5fa;
  if (unionMode === 1) unionPoly0.push([pos.x, pos.y]);
  else                 unionPoly1.push([pos.x, pos.y]);

  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.05),
    new THREE.MeshBasicMaterial({ color })
  );
  dot.position.set(pos.x, pos.y, 0);
  scene.add(dot);
});

window.runPolygonUnion = async () => {
  if (unionPoly0.length < 3 || unionPoly1.length < 3) {
    status('每个多边形至少需要 3 个点'); return;
  }
  unionMode = 0;  // 关闭输入
  mode2D    = false;
  status('计算多边形并集...');
  try {
    const res  = await fetch(`${API}/polygon_union_2d`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ polygon_0: unionPoly0, polygon_1: unionPoly1 }),
    });
    if (!res.ok) { status('服务端错误 ' + res.status); return; }
    const data = await res.json();
    data.polygons.forEach(poly => {
      const pts = [...poly, poly[0]].map(p => new THREE.Vector3(p[0], p[1], 0));
      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: 0xa78bfa, linewidth: 2 })
      ));
    });
    status(`布尔并集：面积=${data.area.toFixed(4)}，${data.polygons.length} 个多边形`);
  } catch(e) { status('错误：' + e.message); }
};
</script>
